<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Easter Egg - Atome3D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #a8d8ea; }
  canvas { display: block; position: fixed; top: 0; left: 0; }

  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 2px 20px; z-index: 10; pointer-events: none;
  }
  #logo-img { width: 25vw; height: auto; display: block; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); transition: all 0.3s ease; }
  @media (orientation: portrait) { #logo-img { width: 40vw; } }
  
  /* Logo réduit en game over */
  #ui.game-over-mode {
    top: 10px;
    justify-content: center;
    padding: 5px 20px;
  }
  #ui.game-over-mode #logo-img {
    width: 15vw;
  }
  @media (orientation: portrait) { 
    #ui.game-over-mode #logo-img { width: 25vw; }
  }

  #scores {
    position: fixed; top: 14px; right: 18px;
    display: flex; gap: 18px; font-family: 'Courier New', monospace; z-index: 10;
  }
  .score-box { text-align: center; }
  .score-label { color: #1b4332; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; }
  .score-value { color: #1b4332; font-size: 1.2rem; font-weight: bold; }

  #overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none; z-index: 20;
  }
  #message {
    color: #ffd166; font-family: 'Courier New', monospace;
    font-size: clamp(1rem, 4vw, 1.5rem); letter-spacing: 6px; text-align: center;
    background: rgba(0, 0, 0, 0.78); padding: 14px 30px;
    border-radius: 12px; border: 1px solid rgba(255,209,102,0.4);
  }
  /* Texte d'écran d'accueil - responsive */
  #tap-hint, #tap-hint2 {
    text-align: center;
    font-family: 'Anton', Impact, 'Arial Black', sans-serif;
    font-weight: 700;
    letter-spacing: 1.5px;
    margin-top: 1.6vh;
    padding: 0 4vw;
    white-space: normal;
    word-break: break-word;
    text-transform: uppercase;
  }
  #tap-hint {
    color: rgb(0, 139, 104);
    font-size: clamp(1.1rem, 5.5vw, 2.6rem);
  }
  #tap-hint2 {
    color: rgb(40, 195, 156);
    font-size: clamp(0.85rem, 3.5vw, 1.6rem);
    margin-top: 0.8vh;
  }

  @media (orientation: portrait) {
    #tap-hint { font-size: clamp(1.2rem, 6.5vw, 3rem); }
    #tap-hint2 { font-size: clamp(0.9rem, 4vw, 1.8rem); }
  }
  #playButton{
    pointer-events: auto;
    margin-top: 16px;
    padding: 25px 30px;
    border: 0;
    border-radius: 12px;
    font-weight: 800;
    letter-spacing: 3px;
    cursor: pointer;
    font-family: Impact, 'Arial Black', sans-serif;
    background: #f9dd08;
    color: #0f1923;
    box-shadow: 0 10px 20px rgba(0,0,0,0.18);
    transition: transform .12s ease, filter .12s ease;
  }
  #playButton:hover{ transform: translateY(-1px); filter: brightness(1.03); }
  #playButton:active{ transform: translateY(1px) scale(0.99); }

  .hidden { display: none !important; }

  /* Overlay sombre 15% */
  .dark-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.15); pointer-events: none;
    opacity: 0; transition: opacity 0.3s; z-index: 5;
  }
  .dark-overlay.active { opacity: 1; }

#game-over-screen {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 200; text-align: center; pointer-events: all;
  }
  #score-svg-container {
    width: 400px; max-width: 90vw; margin: 0 auto 30px; position: relative;
  }
  #score-svg-container svg { width: 100%; height: auto; }
  #final-score-text {
    position: absolute; bottom: 17%; left: 50%; transform: translateX(-50%);
    font-family: Impact, 'Arial Black', sans-serif;
    font-size: 4.5rem; font-weight: 900; color: white;
    text-shadow: 4px 4px 0 rgba(0,0,0,0.4); letter-spacing: 3px;
  }
  #game-over-buttons {
    display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;
  }
  .game-over-btn {
    padding: 15px 30px; background: linear-gradient(135deg, #ffd166, #f6b67d);
    border: none; border-radius: 8px; color: #1b4332;
    font-size: 1.1rem; font-weight: bold;
    font-family: Impact, 'Arial Black', sans-serif;
    cursor: pointer; transition: transform 0.2s;
  }
  .game-over-btn:hover { transform: scale(1.05); }
  .game-over-btn.secondary { background: linear-gradient(135deg, #a8d8ea, #7ab8d4); }

  /* Code promo */
  #promo-code {
    background: linear-gradient(135deg, #4ecdc4, #44a3a0);
    color: white; padding: 20px; border-radius: 10px;
    margin: 20px 0; font-family: Impact, 'Arial Black', sans-serif;
    animation: pulse 2s infinite;
  }
  #promo-code h3 { font-family: Impact, 'Arial Black', sans-serif; font-size: 1.5rem; margin-bottom: 10px; }
  #promo-code .code-container {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-top: 10px;
  }
  #promo-code .code {
    font-size: 2rem; font-weight: bold; letter-spacing: 5px;
    background: rgba(255,255,255,0.2); padding: 10px 20px;
    border-radius: 5px;
  }
  #promo-code .copy-btn {
    background: rgba(255,255,255,0.3); border: none;
    padding: 10px; border-radius: 5px; cursor: pointer;
    font-size: 1.5rem; transition: background 0.2s;
  }
  #promo-code .copy-btn:hover { background: rgba(255,255,255,0.5); }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

  /* Bouton offre */
  .offer-btn {
    padding: 15px 30px; 
    background: linear-gradient(135deg, #4ecdc4, #44a3a0);
    border: none; border-radius: 8px; color: white;
    font-size: 1.1rem; font-weight: bold;
    font-family: Impact, 'Arial Black', sans-serif;
    cursor: pointer; transition: transform 0.2s;
    text-decoration: none; display: inline-block;
  }
  .offer-btn:hover { transform: scale(1.05); }

  /* Bouton partager */
  .share-btn {
    padding: 15px 30px; 
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    border: none; border-radius: 8px; color: white;
    font-size: 1.1rem; font-weight: medium ;
    font-family: Impact, 'Arial Black', sans-serif;
    cursor: pointer; transition: transform 0.2s;
  }
  .share-btn:hover { transform: scale(1.05); }

</style>
</head>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- Fonctions de stockage ---
function saveToStorage(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
}

function loadFromStorage(key, defaultValue = null) {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : defaultValue;
  } catch(e) { return defaultValue; }
}


// --- Copier le code promo ---
function copyPromoCode() {
  const code = document.getElementById('promoCodeText').textContent;
  navigator.clipboard.writeText(code).then(() => {
    alert('Code promo copié : ' + code);
  }).catch(() => {
    alert('Impossible de copier le code');
  });
}

// --- Partager le score ---
async function shareScore() {
  try {
    const text = `J'ai marqué ${score} points à Easter Egg - Atome3D ! 🐱 Suivez @atome3d`;

    // Essayer de partager une image issue du canvas (Web Share Level 2)
    const canvas = document.getElementById('gameCanvas');
    if (canvas && canvas.toBlob && window.File) {
      try {
        // Créer un canvas temporaire pour composer l'image finale (fond + texte centré)
        const shareCanvas = document.createElement('canvas');
        shareCanvas.width = canvas.width;
        shareCanvas.height = canvas.height;
        const sctx = shareCanvas.getContext('2d');

        // Copier le rendu du jeu
        sctx.drawImage(canvas, 0, 0);

        // Dessiner un léger overlay sombre pour améliorer la lisibilité du texte
        sctx.fillStyle = 'rgba(0,0,0,0.18)';
        sctx.fillRect(0, 0, shareCanvas.width, shareCanvas.height);

        // Préparer le texte centré avec wrapping (max 800px)
        const lineMain = `J'ai fait un score de ${score}`;
        const maxTextWidth = Math.min(800, Math.round(shareCanvas.width * 0.85));

        // Police principale responsive
        const baseFontSize = Math.round(shareCanvas.height * 0.07);
        sctx.fillStyle = '#ffffff';
        sctx.textAlign = 'center';
        sctx.textBaseline = 'middle';

        // fonction pour dessiner du texte multi-lignes centré
        function drawWrappedText(ctx, text, x, y, maxWidth, fontSize, lineHeightFactor = 1.12) {
          ctx.font = `bold ${fontSize}px Anton, Impact, 'Arial Black', sans-serif`;
          const words = text.split(' ');
          const lines = [];
          let current = words[0] || '';
          for (let i = 1; i < words.length; i++) {
            const w = words[i];
            const test = current + ' ' + w;
            if (ctx.measureText(test).width <= maxWidth) {
              current = test;
            } else {
              lines.push(current);
              current = w;
            }
          }
          lines.push(current);

          const lineHeight = Math.round(fontSize * lineHeightFactor);
          const totalHeight = lines.length * lineHeight;
          const startY = y - totalHeight / 2 + lineHeight / 2;

          ctx.lineWidth = Math.max(0, Math.round(fontSize * 0.12));
          ctx.fillStyle = '#ffffff';
          for (let i = 0; i < lines.length; i++) {
            const ly = startY + i * lineHeight;
            ctx.fillText(lines[i], x, ly);
          }
          return { top: startY - lineHeight / 2, bottom: startY + totalHeight - lineHeight / 2 };
        }

        const cx = shareCanvas.width / 2;
        const cy = shareCanvas.height / 2;

        // Draw main block (wrapped)
        const mainFont = Math.max(18, baseFontSize);
        const mainBounds = drawWrappedText(sctx, lineMain, cx, cy - Math.round(baseFontSize * 0.2), maxTextWidth, mainFont, 1.1);

        // No secondary promotional line is drawn per request.

        // Exporter la composition
        const blob = await new Promise(resolve => shareCanvas.toBlob(resolve, 'image/png'));
        if (blob) {
          const file = new File([blob], 'easter-egg-score.png', { type: blob.type || 'image/png' });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            // Inclure l'URL du profil Instagram pour référence
            await navigator.share({ files: [file], title: 'Mon score Easter Egg - Atome3D', text, url: 'https://instagram.com/atome3d' });
            return; // partagé avec succès
          }

          // Si on ne peut pas partager automatiquement, afficher un aperçu avec un lien cliquable
          const blobUrl = URL.createObjectURL(blob);
          showSharePreview(blobUrl);
          return;
        }
      } catch (e) {
        console.warn('Partage d\'image échoué, fallback texte:', e);
      }
    }

    // Fallback texte / URL
    if (navigator.share) {
      await navigator.share({ title: 'Mon score Easter Egg - Atome3D', text, url: window.location.href });
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      alert('Score copié dans le presse-papiers ! 📋\n\n' + text);
    } else {
      alert(`Votre score : ${score} points !`);
    }
  } catch (error) {
    console.error('Erreur de partage:', error);
    try {
      const text = `J'ai marqué ${score} points à Easter Egg - Atome3D !`;
      await navigator.clipboard.writeText(text);
      alert('Score copié dans le presse-papiers ! 📋');
    } catch {
      alert(`Votre score : ${score} points !`);
    }
  }
}

// --- Game Over ---
function showGameOver() {
  darkOverlay.classList.add('active');
  gameOverScreen.classList.remove('hidden');
  finalScoreText.textContent = score;
  uiDiv.classList.add('game-over-mode'); // Réduire et repositionner le logo
  
  // Afficher le code promo si score >= 250
  if (score >= 250) {
    promoCodeEl.classList.remove('hidden');
  } else {
    promoCodeEl.classList.add('hidden');
  }
  
  if (score > best) {
    best = score;
    bestEl.textContent = best;
    saveToStorage('catRunnerBest', best);
  }
}

function restartGame() {
  gameOverScreen.classList.add('hidden'); 
  darkOverlay.classList.remove('active');
  uiDiv.classList.remove('game-over-mode'); // Rétablir la taille normale du logo
  gameState = 'idle';
  overlayEl.classList.remove('hidden');
  messageEl.textContent = 'APPUIE POUR CONTINUER';
  
  obstacles.length = 0; particles.length = 0; eggs.length = 0; bonusParticles.length = 0;
  frameCount = 0; score = 0; spawnTimer = 0; eggTimer = 0; bonusNPC = null; bonusNPCSpawned = false; bonusNPC3Spawned = false; printerCounter = 0;
  playerSkin = "normal"; transformEffect = 0;
  player.snapToGround(); player.vy = 0; player.onGround = true;
  player.runCycle = 0; player.squishX = 1; player.squishY = 1;
  speed = BASE_SPEED;
}

// --- Helpers pour l'aperçu de partage ---
function showSharePreview(blobUrl) {
  const preview = document.getElementById('share-preview');
  const img = document.getElementById('share-preview-img');
  const download = document.getElementById('share-preview-download');
  img.src = blobUrl;
  download.href = blobUrl;
  preview.classList.remove('hidden');
  // fermer
  document.getElementById('share-preview-close').onclick = () => {
    preview.classList.add('hidden');
    URL.revokeObjectURL(blobUrl);
  };
}

function computeLayout() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;

  // En portrait (mobile), on base tout sur W pour éviter que tout soit énorme
  const isPortrait = H > W;
  const REF = isPortrait ? W : H; // dimension de référence pour les tailles

  CHAR_H     = Math.round(REF * (isPortrait ? 0.28 : 0.22));
  CHAR_W     = CHAR_H;
  GROUND_Y   = Math.round(H * (isPortrait ? 0.72 : 0.80));
  BASE_SPEED = Math.round(Math.max(W, H * 0.6) * 0.009);
}
computeLayout();

// --- Etat ---
let gameState = 'idle'; // Écran d'accueil avec bouton JOUER
let score = 0, bestScore = 0, frameCount = 0;
let speed = 0, spawnTimer = 0, spawnInterval = 60;
let flashTimer = 0;
let groundOffset = 0;

// --- Joueur ---
const player = {
  get x()  { return Math.round(W * 0.12); },
  y: 0,
  get w()  { return CHAR_W; },
  get h()  { return CHAR_H; },
  vy: 0,
  get gravity()   { 
    const isPortrait = H > W;
    const ref = isPortrait ? W : H;
    const coeff = isPortrait ? 0.0022 : 0.0019; // Gravité ajustée à 0.0022 en portrait
    return ref * coeff;
  },
  get jumpForce() { 
    const isPortrait = H > W;
    const ref = isPortrait ? W : H;
    const coeff = isPortrait ? 0.050 : 0.042; // Ajusté à 0.050 (entre l'ancien et le nouveau)
    return -(ref * coeff);
  },
  onGround: true,
  runCycle: 0,
  bobY: 0,
  squishX: 1, squishY: 1,

  snapToGround() { this.y = GROUND_Y - this.h * 0.82; }, // 0.82 compense le vide en bas du SVG

  jump() {
    if (this.onGround) {
      this.vy = this.jumpForce;
      this.onGround = false;
      this.squishX = 1.22; this.squishY = 0.78;
    }
  },

  update() {
    this.vy += this.gravity;
    this.y  += this.vy;
    this.squishX += (1 - this.squishX) * 0.18;
    this.squishY += (1 - this.squishY) * 0.18;

    const bottom = GROUND_Y - this.h * 0.82;
    if (this.y >= bottom) {
      if (this.vy > 4) { this.squishX = 1.18; this.squishY = 0.82; }
      this.y = bottom; this.vy = 0; this.onGround = true;
    }
    if (gameState === 'playing') {
      this.runCycle += 0.28;
      this.bobY = this.onGround ? Math.abs(Math.sin(this.runCycle)) * Math.min(W,H) * 0.007 : 0;
    }
  },

  draw() {
    ctx.save();
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2 - this.bobY;
    ctx.translate(cx, cy);

    // Légère rotation de course (pas de squish sur le sprite lui-même)
    const tilt = this.onGround ? Math.sin(this.runCycle * 0.5) * 3 : -8;
    ctx.rotate(tilt * Math.PI / 180);

    // Sprite SVG — taille exacte CHAR_W × CHAR_H, aucun scale global appliqué
    ctx.scale(this.squishX, this.squishY);
    const sprite = playerSkin === 'bonus3' ? spriteBonus3 : (playerSkin === 'bonus' ? spriteBonus : spritePerso);
    ctx.drawImage(sprite, -this.w / 2, -this.h / 2, this.w, this.h);
    ctx.restore();
  },

  getBounds() {
    // Hitbox réduite de 50% pour faciliter le jeu
    const mgX = this.w * 0.25; // Marge horizontale (25% de chaque côté = 50% de réduction totale)
    const mgY = this.h * 0.25; // Marge verticale (25% haut/bas = 50% de réduction totale)
    return { 
      x: this.x + mgX, 
      y: this.y + mgY, 
      w: this.w - mgX * 2, 
      h: this.h - mgY * 2 
    };
  }
};
player.snapToGround();

// --- Obstacles ---
const obstacles = [];
const PAL = [['#2d6a4f','#1b4332'],['#40916c','#2d6a4f'],['#52b788','#40916c']];

function makeObstacle(xOffset) {
  const p = PAL[Math.floor(Math.random() * PAL.length)];
  const oh = Math.min(W, H) * 0.15; // Hauteur fixe sans variation
  // Utiliser une référence qui prend en compte les deux dimensions
  const isPortrait = H > W;
  const refDim = isPortrait ? Math.max(W * 1.5, H * 0.5) : W; // En portrait, utiliser une base plus large
  const ow = refDim * (0.020 + Math.random() * 0.016);
  const type = Math.random();
  // Alterner entre les deux types d'imprimantes (0 ou 1)
  const printerType = printerCounter % 2;
  printerCounter++;
  
  // 0% de chance d'empiler un petit obstacle sur un grand
  const isStacked = Math.random() < 0;
  
  if (isStacked) {
    // Créer un obstacle avec un petit au-dessus
    const smallH = oh * 0.5; // Petit fait 50% de la hauteur du grand
    obstacles.push({ 
      x: W + 20 + xOffset, 
      y: GROUND_Y - oh, 
      w: ow, 
      h: oh, 
      c: p, 
      type, 
      printerType,
      stacked: true,
      smallObstacle: {
        h: smallH,
        y: GROUND_Y - oh - smallH, // Positionné au-dessus
        printerType: (printerCounter % 2) // Alterner pour le petit aussi
      }
    });
    printerCounter++; // Incrémenter pour le petit obstacle
  } else {
    // Obstacle simple
    obstacles.push({ x: W + 20 + xOffset, y: GROUND_Y - oh, w: ow, h: oh, c: p, type, printerType });
  }
  
  return ow;
}

function spawnObstacle() {
  makeObstacle(0); // Un seul obstacle à la fois
  // Intervalle irrégulier pour le prochain spawn
  spawnInterval = Math.max(30, 45 + Math.floor(Math.random() * 40) - Math.floor(score / 80) * 3);
}

function drawObstacles() {
  obstacles.forEach(o => {
    // Choisir le sprite en fonction du printerType pour l'obstacle principal
    const printerSprite = o.printerType === 0 ? spritePrinter1 : spritePrinter2;
    // Dessiner l'imprimante en respectant la hauteur de l'obstacle
    // Le sprite SVG fait 150x150, on va le dessiner avec la hauteur de l'obstacle
    // et calculer la largeur proportionnellement
    const spriteAspectRatio = 1; // SVG 150x150 = ratio 1:1
    const drawWidth = o.h * spriteAspectRatio;
    ctx.drawImage(printerSprite, o.x, o.y, drawWidth, o.h);
    
    // Si l'obstacle est empilé, dessiner le petit obstacle au-dessus
    if (o.stacked && o.smallObstacle) {
      const smallSprite = o.smallObstacle.printerType === 0 ? spritePrinter1 : spritePrinter2;
      const smallWidth = o.smallObstacle.h * spriteAspectRatio;
      ctx.drawImage(smallSprite, o.x, o.smallObstacle.y, smallWidth, o.smallObstacle.h);
    }
  });
}

function updateObstacles() {
  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= speed;
    if (obstacles[i].x + obstacles[i].w + 100 < 0) obstacles.splice(i, 1);
  }
}

// --- Nuages ---
const clouds = Array.from({length: 8}, (_, i) => ({
  x: i * (W / 7), y: H * (0.05 + Math.random() * 0.2),
  w: W * (0.09 + Math.random() * 0.08),
  speed: W * (0.0003 + Math.random() * 0.0004)
}));

function drawClouds() {
  clouds.forEach(c => {
    if (gameState === 'playing') c.x -= c.speed;
    if (c.x + c.w < 0) c.x = W + 10;
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.beginPath(); ctx.ellipse(c.x + c.w/2, c.y, c.w/2, c.w*0.17, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x + c.w*0.33, c.y - c.w*0.12, c.w*0.26, c.w*0.14, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x + c.w*0.68, c.y - c.w*0.09, c.w*0.2, c.w*0.12, 0, 0, Math.PI*2); ctx.fill();
  });
}

// --- Montagnes ---
function drawMountains() {
  const peaks = [
    { x: W * 0.0, h: H * 0.0 },
    { x: W * 0.15, h: H * 0.15 },
    { x: W * 0.30, h: H * 0.0 },
    { x: W * 0.45, h: H * 0.20 },
    { x: W * 0.60, h: H * 0.0 },
    { x: W * 0.80, h: H * 0.17 },
    { x: W * 1, h: H * 0.0 },
  ];
  const colors = ['rgba(90,150,110,0.13)', 'rgba(80,140,100,0.16)', 'rgba(100,160,120,0.19)'];
  // Draw back to front with slight color variation
  for (let pass = 0; pass < 3; pass++) {
    ctx.fillStyle = colors[pass];
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    for (const p of peaks) {
      const ox = (pass - 1) * W * 0.04;
      const oy = (pass) * H * 0.03;
      ctx.lineTo(p.x + ox, GROUND_Y - p.h + oy);
    }
    ctx.lineTo(W, GROUND_Y);
    ctx.closePath();
    ctx.fill();
  }
}
// --- Sol ---
function drawGround() {
  // Bande sol dur (ligne sur laquelle court le perso)
  ctx.fillStyle = '#7cb87a';
  ctx.fillRect(0, GROUND_Y, W, H * 0.012);
  // Terre
  ctx.fillStyle = '#5a9e58';
  ctx.fillRect(0, GROUND_Y + H * 0.012, W, H);
}

// --- Herbes de fond (entre montagnes et sol) ---
let bgGrassOffset1 = 0, bgGrassOffset2 = 0;
function drawBgGrass() {
  if (gameState === 'playing') {
    bgGrassOffset1 = (bgGrassOffset1 + speed * 0.4) % (W * 0.07);
    bgGrassOffset2 = (bgGrassOffset2 + speed * 0.22) % (W * 0.10);
  }

  // Couche arrière (plus petite, plus lente)
  ctx.fillStyle = 'rgba(60, 120, 70, 0.45)';
  const step2 = W * 0.10;
  for (let x = -bgGrassOffset2; x < W + step2; x += step2) {
    const gh = H * 0.05;
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.quadraticCurveTo(x - W*0.006, GROUND_Y - gh*0.6, x - W*0.003, GROUND_Y - gh);
    ctx.quadraticCurveTo(x + W*0.003, GROUND_Y - gh*0.6, x + W*0.01, GROUND_Y);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + step2*0.35, GROUND_Y);
    ctx.quadraticCurveTo(x+step2*0.37, GROUND_Y - gh*0.5, x+step2*0.39, GROUND_Y - gh*0.75);
    ctx.quadraticCurveTo(x+step2*0.42, GROUND_Y - gh*0.45, x+step2*0.46, GROUND_Y);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + step2*0.62, GROUND_Y);
    ctx.quadraticCurveTo(x+step2*0.64, GROUND_Y - gh*0.7, x+step2*0.66, GROUND_Y - gh*0.9);
    ctx.quadraticCurveTo(x+step2*0.69, GROUND_Y - gh*0.65, x+step2*0.73, GROUND_Y);
    ctx.fill();
  }

  // Couche avant (plus grande, plus rapide)
  ctx.fillStyle = 'rgba(50, 140, 65, 0.6)';
  const step1 = W * 0.07;
  for (let x = -bgGrassOffset1; x < W + step1; x += step1) {
    const gh = H * 0.07;
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.quadraticCurveTo(x - W*0.007, GROUND_Y - gh*0.7, x - W*0.004, GROUND_Y - gh);
    ctx.quadraticCurveTo(x + W*0.004, GROUND_Y - gh*0.7, x + W*0.012, GROUND_Y);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + step1*0.4, GROUND_Y);
    ctx.quadraticCurveTo(x+step1*0.42, GROUND_Y - gh*0.55, x+step1*0.44, GROUND_Y - gh*0.8);
    ctx.quadraticCurveTo(x+step1*0.47, GROUND_Y - gh*0.5, x+step1*0.52, GROUND_Y);
    ctx.fill();
  }
}



// --- Particules ---
const particles = [];
function spawnParticles() {
  for (let i = 0; i < 18; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = W * (0.004 + Math.random() * 0.007);
    particles.push({ x: player.x+player.w/2, y: player.y+player.h/2, vx: Math.cos(a)*v, vy: Math.sin(a)*v - H*0.006, life: 45, maxLife: 45, color: ['#ffd166','#ef476f','#06d6a0','#118ab2','#fff'][Math.floor(Math.random()*5)], r: W*0.005+Math.random()*W*0.005 });
  }
}
function updateDrawParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += H * 0.0007; p.life--;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*(p.life/p.maxLife), 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Oeufs ---
const EGG_TINTS = [
  [1.0, 0.2, 0.2],   // rouge vif
  [0.2, 0.9, 0.2],   // vert vif
  [1.0, 0.6, 0.0],   // orange
  [0.8, 0.1, 1.0],   // violet
  [1.0, 0.1, 0.6],   // rose
  [0.1, 0.8, 1.0],   // cyan
];
const eggs = [];
let eggTimer = 0;
const EGG_INTERVAL = 300; // Un oeuf tous les 50 points (50 points * 6 frames = 300 frames)
let bonusParticles = [];

function eggOverlapsObstacle(ex, ew) {
  for (const o of obstacles) {
    const margin = 50; // Distance de sécurité de 50px comme demandé
    
    // Utiliser la hitbox réduite de l'obstacle (40% de la taille)
    const hitboxReduction = 0.4;
    const hitboxMargin = (1 - hitboxReduction) / 2;
    const hitX = o.x + (o.w * hitboxMargin);
    const hitW = o.w * hitboxReduction;
    
    if (ex < hitX + hitW + margin && ex + ew + margin > hitX) return true;
  }
  return false;
}

function spawnEgg() {
  const tint = EGG_TINTS[Math.floor(Math.random() * EGG_TINTS.length)];
  const sz = CHAR_H * 0.45;
  const ex = W + 20;
  // Si un obstacle est trop proche, retourner false pour réessayer plus tard
  if (eggOverlapsObstacle(ex, sz)) return false;
  eggs.push({
    x: ex,
    y: GROUND_Y - sz * 0.82,
    w: sz, h: sz,
    tint,
    collected: false,
    alpha: 1,
    bobPhase: Math.random() * Math.PI * 2
  });
  return true; // Spawn réussi
}

function drawEggs() {
  eggs.forEach(e => {
    if (e.collected) return;
    ctx.save();
    // Petit bob vertical
    const bob = Math.sin(Date.now() * 0.004 + e.bobPhase) * 4;
    ctx.translate(e.x + e.w/2, e.y + e.h/2 + bob);

    // Teinte colorée via compositing
    ctx.globalAlpha = e.alpha;

    // Dessiner le SVG de base
    ctx.drawImage(spriteEgg, -e.w/2, -e.h/2, e.w, e.h);

    // Overlay de couleur saturée par-dessus
    ctx.globalCompositeOperation = 'multiply';
    ctx.fillStyle = `rgb(${Math.round(e.tint[0]*255)}, ${Math.round(e.tint[1]*255)}, ${Math.round(e.tint[2]*255)})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, e.w*0.45, e.h*0.48, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();

    // Halo lumineux autour de l'oeuf
    ctx.save();
    ctx.globalAlpha = 0.18 + Math.abs(Math.sin(Date.now()*0.004 + e.bobPhase)) * 0.12;
    ctx.fillStyle = `rgb(${Math.round(e.tint[0]*255)}, ${Math.round(e.tint[1]*255)}, ${Math.round(e.tint[2]*255)})`;
    ctx.beginPath();
    ctx.ellipse(e.x + e.w/2, e.y + e.h/2 + bob, e.w*0.7, e.h*0.7, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function spawnBonusParticles(x, y, tint) {
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = W * (0.003 + Math.random() * 0.006);
    bonusParticles.push({
      x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v - H*0.007,
      life: 40, maxLife: 40,
      color: `rgb(${Math.round(tint[0]*255)},${Math.round(tint[1]*255)},${Math.round(tint[2]*255)})`,
      r: W*0.006 + Math.random()*W*0.004
    });
  }
  // Texte +50 flottant
  bonusParticles.push({ text: true, x, y, vy: -H*0.006, life: 55, maxLife: 55, color: '#fff' });
}

function updateDrawBonusParticles() {
  for (let i = bonusParticles.length-1; i >= 0; i--) {
    const p = bonusParticles[i];
    p.x += (p.vx||0); p.y += p.vy; if (!p.text) p.vy += H*0.0005; p.life--;
    if (p.life <= 0) { bonusParticles.splice(i,1); continue; }
    ctx.globalAlpha = p.life / p.maxLife;
    if (p.text) {
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.round(H*0.04)}px 'Courier New'`;
      ctx.textAlign = 'center';
      ctx.fillText('+50', p.x, p.y);
      ctx.textAlign = 'left';
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r*(p.life/p.maxLife), 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function updateEggs() {
  const pb = player.getBounds();
  for (let i = eggs.length-1; i >= 0; i--) {
    const e = eggs[i];
    e.x -= speed;
    // Ramassage — hitbox généreuse, pas de game over
    if (!e.collected &&
        pb.x < e.x + e.w && pb.x + pb.w > e.x &&
        pb.y < e.y + e.h && pb.y + pb.h > e.y) {
      e.collected = true;
      score += 50;
      frameCount += 50 * 6; // sync frameCount avec le bonus
      scoreEl.textContent = score;
      if (score > bestScore) { bestScore = score; bestEl.textContent = bestScore; }
      spawnBonusParticles(e.x + e.w/2, e.y, e.tint);
    }
    if (e.x + e.w < 0) eggs.splice(i, 1);
  }
}
function checkCollision() {
  const pb = player.getBounds();
  for (const o of obstacles) {
    // Réduction de la hitbox de 60% = garder 40% de la taille
    const hitboxReduction = 0.4;
    const margin = (1 - hitboxReduction) / 2; // 30% de chaque côté pour centrer
    
    // Calculer la hitbox réduite et centrée
    const hitX = o.x + (o.w * margin);
    const hitY = o.y + (o.h * margin);
    const hitW = o.w * hitboxReduction;
    const hitH = o.h * hitboxReduction;
    
    // Vérifier la collision avec la hitbox réduite
    if (pb.x < hitX + hitW && pb.x + pb.w > hitX && pb.y < hitY + hitH && pb.y + pb.h > hitY) return true;
  }
  return false;
}

// --- Dessin du ciel ---
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#a8d8ea');
  g.addColorStop(1, '#d4eeda');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}


// --- Personnage bonus ---
let bonusNPC = null;
let bonusNPCSpawned = false;
let bonusNPC3Spawned = false; // Troisième perso
let transformEffect = 0;

function spawnBonusNPC() {
  const sz = CHAR_H * 0.95;
  bonusNPC = {
    x: W + 20,
    y: GROUND_Y - sz * 0.82,
    w: sz, h: sz,
    bobPhase: Math.random() * Math.PI * 2,
    type: 'bonus' // Type du bonus
  };
}

function spawnBonusNPC3() {
  const sz = CHAR_H * 0.95;
  bonusNPC = {
    x: W + 20,
    y: GROUND_Y - sz * 0.82,
    w: sz, h: sz,
    bobPhase: Math.random() * Math.PI * 2,
    type: 'bonus3' // Troisième type
  };
}

function drawBonusNPC() {
  if (!bonusNPC) return;
  const bob = Math.sin(Date.now() * 0.003 + bonusNPC.bobPhase) * 5;

  // Halo doré pulsant
  const pulse = 0.25 + Math.abs(Math.sin(Date.now() * 0.005)) * 0.3;
  ctx.save();
  ctx.globalAlpha = pulse;
  const grd = ctx.createRadialGradient(
    bonusNPC.x + bonusNPC.w/2, bonusNPC.y + bonusNPC.h/2 + bob, bonusNPC.w * 0.15,
    bonusNPC.x + bonusNPC.w/2, bonusNPC.y + bonusNPC.h/2 + bob, bonusNPC.w * 0.75
  );
  grd.addColorStop(0, 'rgba(255,220,50,0.7)');
  grd.addColorStop(1, 'rgba(255,150,0,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.ellipse(bonusNPC.x + bonusNPC.w/2, bonusNPC.y + bonusNPC.h/2 + bob, bonusNPC.w * 0.75, bonusNPC.h * 0.75, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Etoiles orbitales
  ctx.save();
  const t = Date.now() * 0.003;
  for (let i = 0; i < 4; i++) {
    const angle = t + (i * Math.PI / 2);
    const rx = Math.cos(angle) * bonusNPC.w * 0.6;
    const ry = Math.sin(angle) * bonusNPC.h * 0.25;
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(bonusNPC.x + bonusNPC.w/2 + rx, bonusNPC.y + bonusNPC.h/2 + ry + bob, W * 0.004, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Sprite - choisir selon le type
  const bonusSprite = bonusNPC.type === 'bonus3' ? spriteBonus3 : spriteBonus;
  ctx.drawImage(bonusSprite, bonusNPC.x, bonusNPC.y + bob, bonusNPC.w, bonusNPC.h);

  // Label ""
  ctx.save();
  ctx.globalAlpha = 0.85 + Math.sin(Date.now() * 0.006) * 0.15;
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold ' + Math.round(H * 0.025) + 'px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('', bonusNPC.x + bonusNPC.w/2, bonusNPC.y + bob - H * 0.02);
  ctx.textAlign = 'left';
  ctx.restore();
}

function updateBonusNPC() {
  if (!bonusNPC) return;
  bonusNPC.x -= speed * 0.8;

  // Collision joueur → transformation
  const pb = player.getBounds();
  if (pb.x < bonusNPC.x + bonusNPC.w * 0.75 &&
      pb.x + pb.w > bonusNPC.x + bonusNPC.w * 0.15 &&
      pb.y < bonusNPC.y + bonusNPC.h * 0.9 &&
      pb.y + pb.h > bonusNPC.y + bonusNPC.h * 0.1) {
    playerSkin = bonusNPC.type; // Appliquer le skin selon le type du bonus
    transformEffect = 45;
    bonusNPC = null;
    for (let i = 0; i < 24; i++) {
      const a = Math.random() * Math.PI * 2;
      const v = W * (0.004 + Math.random() * 0.008);
      bonusParticles.push({
        x: player.x + player.w/2, y: player.y + player.h/2,
        vx: Math.cos(a)*v, vy: Math.sin(a)*v - H*0.008,
        life: 55, maxLife: 55,
        color: ['#ffd700','#fff','#ffaa00','#ffe566'][Math.floor(Math.random()*4)],
        r: W*0.007 + Math.random()*W*0.006
      });
    }
    bonusParticles.push({ text: true, x: player.x + player.w/2, y: player.y - H*0.03, vy: -H*0.005, life: 70, maxLife: 70, color: '#ffd700' });
    return;
  }

  if (bonusNPC.x + bonusNPC.w < 0) bonusNPC = null;
}

function drawTransformEffect() {
  if (transformEffect <= 0) return;
  ctx.fillStyle = 'rgba(255,215,0,' + ((transformEffect / 45) * 0.35) + ')';
  ctx.fillRect(0, 0, W, H);
  transformEffect--;
}


// --- Boucle ---
function gameLoop() {
  drawSky();
  drawMountains();
  drawClouds();
  drawGround();
  drawBgGrass();
  drawEggs();
  drawBonusNPC();
  drawObstacles();
  updateDrawParticles();
  player.update();
  player.draw();
  drawTransformEffect();
  updateDrawBonusParticles();

  // Draw `logo-atome3d.svg` at the bottom of the game canvas.
  // When the UI enters game-over mode the logo is drawn smaller.
  if (typeof logoAtomeImg !== 'undefined' && logoAtomeImg.complete) {
    const isGameOverMode = uiDiv && uiDiv.classList && uiDiv.classList.contains('game-over-mode');
    const maxLogoW = Math.min(W * 0.28, 220);
    const logoW = isGameOverMode ? Math.min(maxLogoW * 0.5, 110) : maxLogoW;
    const logoH = Math.max(1, logoW * logoAtomeAspect);
    const logoX = (W - logoW) / 2;
    const logoY = H - logoH - 30; // 30px bottom margin
    ctx.drawImage(logoAtomeImg, logoX, logoY, logoW, logoH);
  }


  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,209,102,${(flashTimer/20)*0.1})`;
    ctx.fillRect(0,0,W,H);
    flashTimer--;
  }

  if (gameState === 'playing') {
    frameCount++;
    score = Math.floor(frameCount / 6);
    scoreEl.textContent = score;
    if (score > bestScore) { bestScore = score; bestEl.textContent = bestScore; }
    if (score > 0 && score % 100 === 0 && frameCount % 6 === 0) flashTimer = 20;

    speed = BASE_SPEED * (1 + Math.floor(score / 100) * 0.1);
    // Spawn 2ème perso bonus à 200 pts (une seule fois par partie)
    if (score >= 200 && !bonusNPCSpawned && !bonusNPC) {
      spawnBonusNPC();
      bonusNPCSpawned = true;
    }
    // Spawn 3ème perso bonus à 350 pts (une seule fois par partie)
    if (score >= 350 && !bonusNPC3Spawned && !bonusNPC) {
      spawnBonusNPC3();
      bonusNPC3Spawned = true;
    }
    spawnInterval = Math.max(32, 60 - Math.floor(score / 80) * 3);
    updateObstacles();
    updateEggs();
    updateBonusNPC();
    spawnTimer++;
    if (spawnTimer >= spawnInterval) { spawnObstacle(); spawnTimer = 0; }
    eggTimer++;
    if (eggTimer >= EGG_INTERVAL) { 
      const spawned = spawnEgg(); 
      if (spawned) {
        // Spawn réussi : reset avec variation aléatoire
        eggTimer = Math.floor(Math.random() * 60); 
      } else {
        // Spawn bloqué par obstacle : réessaie dans 10 frames
        eggTimer = EGG_INTERVAL - 10;
      }
    }

    if (checkCollision()) {
      gameState = 'dead';
      spawnParticles();
      overlayEl.classList.add('hidden');
      showGameOver();
    }
  }
  requestAnimationFrame(gameLoop);
}

// --- Input ---
function handleInput() {
  if (gameState === 'dead') return; // Ignoré en dead
  
  if (gameState === 'idle') {
    gameState = 'playing';
    overlayEl.classList.add('hidden');
    frameCount = 0; score = 0; speed = BASE_SPEED;
    obstacles.length = 0; eggs.length = 0; bonusParticles.length = 0; spawnTimer = 0; eggTimer = 0; bonusNPC = null; bonusNPCSpawned = false; bonusNPC3Spawned = false; playerSkin = "normal"; transformEffect = 0; printerCounter = 0;
    player.snapToGround(); player.vy = 0; player.onGround = true;
    player.runCycle = 0; player.squishX = 1; player.squishY = 1;
  } else if (gameState === 'playing') {
    player.jump();
  }
}

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); handleInput(); } });
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(); }, {passive:false});
canvas.addEventListener('mousedown',  e => { e.preventDefault(); handleInput(); });

// Initialisation au démarrage
// L'overlay (écran d'accueil) reste visible jusqu'à ce que le joueur clique sur JOUER ou appuie.

gameLoop();</script>
